<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Portfolio Admin</title>
<style>
  :root { --ink:#17181a; --soft:#6b6f76; --line:#e2e2e2; --accent:#3b4b8c; --bg:#fafafa; }
  * { box-sizing: border-box; }
  body { font-family: -apple-system, 'Segoe UI', sans-serif; background: var(--bg); color: var(--ink); margin: 0; }
  .wrap { max-width: 880px; margin: 0 auto; padding: 32px 24px 80px; }
  header.top { border-bottom: 1px solid var(--line); background: #fff; }
  header.top .wrap { padding: 18px 24px; display: flex; justify-content: space-between; align-items: center; }
  header.top a.brand { font-weight: 600; text-decoration: none; color: var(--ink); }
  nav.tabs { display: flex; flex-wrap: wrap; gap: 8px; margin: 24px 0; }
  nav.tabs a { padding: 6px 14px; border: 1px solid var(--line); border-radius: 999px; text-decoration: none; color: var(--ink); font-size: .88rem; background: #fff; }
  nav.tabs a.active { background: var(--ink); color: #fff; border-color: var(--ink); }
  h1 { font-size: 1.4rem; margin: 0 0 8px; }
  .flash { background: #eaf6ea; border: 1px solid #b7e0b7; color: #1d5f1d; padding: 10px 14px; border-radius: 8px; margin-bottom: 20px; font-size: .9rem; }
  label { display: block; font-size: .82rem; color: var(--soft); margin: 14px 0 4px; }
  input[type=text], input[type=email], input[type=url], textarea {
    width: 100%; padding: 10px 12px; border: 1px solid var(--line); border-radius: 8px; font-size: .93rem; font-family: inherit;
  }
  textarea { min-height: 90px; resize: vertical; }
  button, .btn {
    background: var(--ink); color: #fff; border: none; padding: 10px 20px; border-radius: 8px;
    font-size: .9rem; cursor: pointer; margin-top: 18px;
  }
  button.secondary, .btn.secondary { background: #fff; color: var(--ink); border: 1px solid var(--line); }
  button.danger { background: #fff; color: #b5362f; border: 1px solid #f0c4c1; }
  .card { background: #fff; border: 1px solid var(--line); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .row-actions { display: flex; justify-content: flex-end; }
  .item-index { font-size: .78rem; color: var(--soft); text-transform: uppercase; letter-spacing: .04em; }
  .photo-preview { width: 96px; height: 96px; border-radius: 50%; object-fit: cover; border: 1px solid var(--line); margin-bottom: 10px; }
  .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
  .dashboard-grid a { display: block; padding: 20px; background: #fff; border: 1px solid var(--line); border-radius: 12px; text-decoration: none; color: var(--ink); }
  .dashboard-grid a:hover { border-color: var(--accent); }
  .dashboard-grid .count { color: var(--soft); font-size: .82rem; margin-top: 4px; }
</style>
</head>
<body>
<header class="top">
  <div class="wrap">
    <a class="brand" href="{{ url_for('dashboard') }}">⌂ Portfolio Admin</a>
    <a class="btn secondary" href="{{ url_for('dashboard') }}" style="margin:0; padding:6px 14px; font-size:.82rem;">Dashboard</a>
  </div>
</header>
<div class="wrap">
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      {% for m in messages %}<div class="flash">{{ m }}</div>{% endfor %}
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>
</body>
</html>
