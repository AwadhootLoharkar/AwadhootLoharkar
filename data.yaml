about:
  paragraphs:
    - "I'm an M.Sc. student in Quantum Technologies and Engineering at the QuanTEEM Erasmus Mundus Joint Master programme (Université de Bourgogne & RPTU Kaiserslautern), and an Erasmus Mundus Scholarship holder. My work sits at the intersection of quantum simulation, tensor networks, and quantum chemistry — building tools that make correlated many-body systems tractable on near-term quantum hardware and HPC clusters."
    - "I'm currently completing my master's thesis at Fraunhofer ITWM, developing a hybrid DMET framework for simulating strongly correlated protein-ligand systems, and building QuEnAIS, an open-source simulation pipeline."

experience:
  - title: "Master Thesis — QuEnAIS Project"
    org: "Fraunhofer ITWM, Kaiserslautern"
    date: "Mar 2026 — Sept 2026"
    description: "Engineered a hybrid DMET framework for quantum simulation of strongly correlated protein-ligand systems, mapping high-dimensional active spaces onto optimized quantum circuits. Deploying quantum impurity solvers (SQD, SKQD, SqDRIFT) and building self-consistent DMET loops to extract quantum descriptors (HOMO/LUMO, Fukui indices)."
  - title: "Semester Research Student"
    org: "Sebastian Eggert Group, RPTU Kaiserslautern"
    date: "Oct 2025 — Feb 2026"
    description: "Researched the ground-state of the 1D extended anyonic Hubbard model using DMRG, VQE, and SKQD. Demonstrated superior convergence of SKQD over VQE — 0.05% vs. 10% relative error against DMRG for 5–15 site lattices."
  - title: "Research Assistant (HiWi)"
    org: "Fraunhofer ITWM, Kaiserslautern"
    date: "Jun 2025 — Feb 2026"
    description: "Researched scalable multi-node, multi-GPU tensor-network simulations for quantum many-body physics and chemistry using QUIMB, ITensors, Qiskit, and cuQuantum on HPC clusters. Contributed to the DLR-funded QUANT²AI project, benchmarking QML pipelines across classical and quantum backends."
  - title: "Quantum Research Intern"
    org: "Creed & Bear · Remote"
    date: "Dec 2023 — Sep 2024"
    description: "Contributed to hybrid quantum-classical optimization for power distribution networks (TCS Quantum Challenge 2023); investigated post-quantum cryptography vulnerabilities."
  - title: "Quantum Research Intern — QWorld Programme"
    org: "Classiq Technologies · Remote"
    date: "Aug 2023 — Dec 2023"
    description: "Implemented quantum oracle construction and amplitude amplification circuits on the Classiq synthesis platform; worked on high-level-to-gate-level compilation and circuit depth optimisation for near-term hardware."
  - title: "Quantum Intern"
